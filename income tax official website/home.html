<!DOCTYPE html>
<html>
		<head>
			<title> Income Tax Portal</title>
		</head>
<style>
		*{
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: sans-serif;
				font-weight: lighter;
		}
		body{
			height: 100vh;
			background-image: url('C:/Users/furka/Downloads/ITP.png');
			background-size: cover;
		}
		.flex{
				display: flex;
				align-items: center;		
		}
		.container1{
				width: 100%;
				height: 80px;
				color: white;
				background: rgba(0,0,0,0.5);

		nav{
				margin: 0 30px;
		}
		ul{
				list-style: none;
				margin: 20px;
				font-size: 20px;
		}
		li{

				cursor; pointer;

		.text{

				margin-right: 50px;

		}
		.submit{
				width: 100px;
				margin-right: 50px;
				background: black;
				color:green;
				border: 3px solid green;
		}
		.slider{
				margin-top: 10px;
				background: black;
				font-size: 25px;
				color: white;
				
				align-items: center;
		}
		.container2{
				position:absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
		}
		.log-button{
				text-decoration:none;
				padding: 10px;
				font-size: 35px;
				margin: 20px;
				border-radius: 100px;
		}
		.login{
				color: white;
				background: rgba(0,128,0,0.85);
		}
		.register{
				color: black;
				background: rgba(0,183,255,0.85);
		}
</style>
<body>
		
		
		<div class = "container1 flex">
				<nav class = "flex">

						<ul class = "flex">
								<a href="website.html">
								<li>Home</li></a>
								<a href="aboutus.html">
								<li>About Us</li></a>
								<a href="contactus.html">
								<li>Contact Us</li></a>
						</ul>
						<div class = "inp">
								<input type = "text" placeholder = "Search" class = "input text">
								<input type = "submit" value = "Search" class = "input submit">
						</div>

		</div>
